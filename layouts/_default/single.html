{{ define "main" }}
<article class="max-w-4xl mx-auto">
    <header class="mb-10 border-b border-gray-200 pb-6">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">{{ .Title }}</h1>
        {{ if and (not .IsHome) (.Params.date) }}
        <div class="text-sm font-mono text-gray-500">
            Termin kompilacji: <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02.01.2006" }}</time>
        </div>
        {{ end }}
    </header>
    
    <div class="prose prose-slate max-w-none text-gray-700 space-y-6">
        {{ .Content }}
    </div>
</article>
{{ end }}
