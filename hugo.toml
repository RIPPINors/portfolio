baseURL = "https://RIPPINors.github.io/portfolio/"
relativeURLs = true
canonifyURLs = false
languageCode = "pl-pl"
title = "Antoni Góralewski"

# Włączenie trybu bezpiecznego dla HTML w Markdownie (przydaje się przy osadzaniu np. iframe z wideo czy audio)
[markup.goldmark.renderer]
unsafe = true

# Konfiguracja parametrów globalnych (.Site.Params)
[params]
  author = 'Antoni Góralewski'
  description = 'Portfolio inżynierskie: mechatronika, automatyka przemysłowa (PLC S7-1200), systemy UNIX oraz produkcja radiowa.'
  
  # Tu możesz zdefiniować linki do swoich profili, żeby później wywołać je w stopce
  github = 'https://github.com/twoj-profil'
  linkedin = 'https://linkedin.com/in/twoj-profil'

# Menu główne - to powiąże się z nawigacją w headerze
[menu]
  [[menu.main]]
    identifier = "about"
    name = "O mnie"
    url = "/portfolio/o-mnie/"
    weight = 10

  [[menu.main]]
    identifier = "projects"
    name = "Projekty"
    url = "/portfolio/projekty/"
    weight = 20

  [[menu.main]]
    identifier = "contact"
    name = "Kontakt"
    url = "/portfolio/kontakt/"
    weight = 30


